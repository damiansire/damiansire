config:
  # MD013 (line-length): deshabilitado. Este README usa una fila por
  # repo con badges Shields.io inline; forzar 80 columnas rompe ese
  # formato sin ganar legibilidad real.
  MD013: false
  # MD033 (no-inline-html): solo <sub> está permitido, usado a propósito
  # para el disclaimer del footer en texto chico.
  MD033:
    allowed_elements:
      - sub
